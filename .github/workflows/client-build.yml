name: Client Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PATH: ${{ secrets.VPS_PATH }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: python -m pip install --upgrade pip setuptools wheel cython pyinstaller

      - name: Install client deps
        run: python -m pip install -r FireStorm/requirements.txt

      - name: Compute build version (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "BUILD_VERSION=$(python -c 'from datetime import datetime; print(datetime.now().strftime(\"%d.%m.%Y\"))')" >> "$GITHUB_ENV"
          fi

      - name: Compute build version (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace "^v", ""
          } else {
            $version = (Get-Date).ToString("dd.MM.yyyy")
          }
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import GPG key (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu') && env.GPG_PRIVATE_KEY != ''
        shell: bash
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          if [[ -n "${GPG_KEY_ID}" ]]; then
            echo "GPG_KEY_ID=${GPG_KEY_ID}" >> $GITHUB_ENV
          fi

      - name: Build client + update
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          SIGN_ARGS=""
          if [[ "${{ matrix.os }}" == "ubuntu-latest" && -n "${GPG_PRIVATE_KEY}" ]]; then
            SIGN_ARGS="--sign"
            if [[ -n "${GPG_KEY_ID}" ]]; then
              SIGN_ARGS="$SIGN_ARGS --gpg-key ${GPG_KEY_ID}"
            fi
          fi
          python tools/autobuild.py --version "${{ env.BUILD_VERSION }}" $SIGN_ARGS

      - name: Build installer (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: bash tools/build_installer_linux.sh "${{ env.BUILD_VERSION }}"

      - name: Build installer (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash tools/build_installer_macos.sh "${{ env.BUILD_VERSION }}"

      - name: Install NSIS (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install nsis -y

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./tools/build_installer_windows.ps1 -Version $env:BUILD_VERSION

      - name: Upload update artifacts (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: firestorm-${{ matrix.os }}-${{ env.BUILD_VERSION }}
          path: |
            dist_client/**
            update_*.zip
            update_*.zip.asc

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestorm-installer-${{ matrix.os }}-${{ env.BUILD_VERSION }}
          path: |
            dist_installer/**

      - name: Deploy update to VPS
        if: startsWith(matrix.os, 'ubuntu') && env.VPS_HOST != '' && env.VPS_SSH_KEY != ''
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/updates ${VPS_PATH}/installers/linux ${VPS_PATH}/installers/mac ${VPS_PATH}/installers/win"
          rsync -av update_*.zip "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/"
          if ls update_*.zip.asc >/dev/null 2>&1; then
            rsync -av update_*.zip.asc "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/"
          fi

      - name: Deploy installer to VPS (Linux)
        if: startsWith(matrix.os, 'ubuntu') && env.VPS_HOST != '' && env.VPS_SSH_KEY != ''
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/installers/linux"
          rsync -av dist_installer/linux/*.deb "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/linux/"

      - name: Deploy installer to VPS (macOS)
        if: matrix.os == 'macos-latest' && env.VPS_HOST != '' && env.VPS_SSH_KEY != ''
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/installers/mac"
          scp dist_installer/macos/*.dmg "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/mac/"

      - name: Deploy installer to VPS (Windows)
        if: matrix.os == 'windows-latest' && env.VPS_HOST != '' && env.VPS_SSH_KEY != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.ssh" | Out-Null
          $keyPath = "$env:USERPROFILE\.ssh\id_rsa"
          Set-Content -Path $keyPath -Value $env:VPS_SSH_KEY
          ssh -o StrictHostKeyChecking=no "$env:VPS_USER@$env:VPS_HOST" "mkdir -p $env:VPS_PATH/installers/win"
          $files = Get-ChildItem -Path "dist_installer/windows/*.exe" -ErrorAction SilentlyContinue
          if (-not $files) {
            Write-Host "No Windows installer found, skipping deploy."
            exit 0
          }
          foreach ($file in $files) {
            scp -o StrictHostKeyChecking=no "$($file.FullName)" "$env:VPS_USER@$env:VPS_HOST:$env:VPS_PATH/installers/win/"
          }
