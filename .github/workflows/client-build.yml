name: Client Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PATH: ${{ secrets.VPS_PATH }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: python -m pip install --upgrade pip setuptools wheel cython pyinstaller

      - name: Install client deps
        run: python -m pip install -r FireStorm/requirements.txt

      - name: Compute build version (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            VERSION="$(date '+%d.%m.%Y').${GITHUB_RUN_NUMBER:-0}"
            echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          fi

      - name: Compute build version (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace "^v", ""
          } else {
            $version = (Get-Date).ToString("dd.MM.yyyy") + "." + $env:GITHUB_RUN_NUMBER
          }
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Import GPG key
        if: env.GPG_PRIVATE_KEY != ''
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install gnupg
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            choco install gnupg -y
          fi
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          if [[ -n "${GPG_KEY_ID}" ]]; then
            echo "GPG_KEY_ID=${GPG_KEY_ID}" >> $GITHUB_ENV
          fi

      - name: Build client dist
        shell: bash
        run: |
          python tools/build_client.py --dist dist_client --version "${{ env.BUILD_VERSION }}"

      - name: Build installer (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: bash tools/build_installer_linux.sh "${{ env.BUILD_VERSION }}"

      - name: Build installer (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash tools/build_installer_macos.sh "${{ env.BUILD_VERSION }}"

      - name: Install NSIS (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install nsis -y

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./tools/build_installer_windows.ps1 -Version $env:BUILD_VERSION

      - name: Build update (per OS)
        shell: bash
        run: |
          SIGN_ARGS=""
          if [[ -n "${GPG_PRIVATE_KEY}" ]]; then
            SIGN_ARGS="--sign"
            if [[ -n "${GPG_KEY_ID}" ]]; then
              SIGN_ARGS="$SIGN_ARGS --gpg-key ${GPG_KEY_ID}"
            fi
          fi
          python tools/build_update.py --dist dist_client --version "${{ env.BUILD_VERSION }}" --app-dir dist $SIGN_ARGS

      - name: Upload update artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestorm-${{ matrix.os }}-${{ env.BUILD_VERSION }}
          path: |
            update_*.zip
            update_*.zip.asc

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestorm-installer-${{ matrix.os }}-${{ env.BUILD_VERSION }}
          path: |
            dist_installer/**

      - name: Deploy update to VPS
        if: env.VPS_HOST != '' && env.VPS_SSH_KEY != '' && matrix.os != 'windows-latest'
        shell: bash
        run: |
          PLATFORM="linux"
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            PLATFORM="mac"
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/updates/${PLATFORM} ${VPS_PATH}/installers/linux ${VPS_PATH}/installers/mac ${VPS_PATH}/installers/win"
          rsync -av update_*.zip "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/${PLATFORM}/"
          if ls update_*.zip.asc >/dev/null 2>&1; then
            rsync -av update_*.zip.asc "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/${PLATFORM}/"
          fi

      - name: Deploy installer to VPS (Linux)
        if: startsWith(matrix.os, 'ubuntu') && env.VPS_HOST != '' && env.VPS_SSH_KEY != ''
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/installers/linux"
          rsync -av dist_installer/linux/*.deb "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/linux/"

      - name: Deploy installer to VPS (macOS)
        if: matrix.os == 'macos-latest' && env.VPS_HOST != '' && env.VPS_SSH_KEY != ''
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/installers/mac"
          scp dist_installer/macos/*.dmg "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/mac/"

      - name: Deploy installer to VPS (Windows)
        if: false
        run: echo "disabled"
