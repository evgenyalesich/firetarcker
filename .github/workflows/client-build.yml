name: Client Build

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PATH: ${{ secrets.VPS_PATH }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: python -m pip install --upgrade pip setuptools wheel cython pyinstaller

      - name: Install client deps
        run: python -m pip install -r FireStorm/requirements.txt

      - name: Compute build version (unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "BUILD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            VERSION="$(date '+%d.%m.%Y').${GITHUB_RUN_NUMBER:-0}"
            echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          fi

      - name: Compute build version (windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace "^v", ""
          } else {
            $version = (Get-Date).ToString("dd.MM.yyyy") + "." + $env:GITHUB_RUN_NUMBER
          }
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build client dist
        shell: bash
        run: |
          python tools/build_client.py --dist dist_client --version "${{ env.BUILD_VERSION }}"

      - name: Build installer (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: bash tools/build_installer_linux.sh "${{ env.BUILD_VERSION }}"

      - name: Build installer (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: bash tools/build_installer_macos.sh "${{ env.BUILD_VERSION }}"

      - name: Install NSIS (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: choco install nsis -y

      - name: Build installer (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./tools/build_installer_windows.ps1 -Version $env:BUILD_VERSION

      - name: Build update (per OS)
        shell: bash
        run: |
          python tools/build_update.py --dist dist_client --version "${{ env.BUILD_VERSION }}" --app-dir dist

      - name: Upload update artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestorm-${{ matrix.os }}-${{ env.BUILD_VERSION }}
          path: |
            update_*.zip
            update_*.zip.asc

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firestorm-installer-${{ matrix.os }}-${{ env.BUILD_VERSION }}
          path: |
            dist_installer/**

  deploy_all:
    name: Deploy updates/installers to VPS
    runs-on: ubuntu-latest
    needs: build
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PATH: ${{ secrets.VPS_PATH }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Ensure signing secrets
        shell: bash
        run: |
          if [[ -z "${GPG_PRIVATE_KEY}" ]]; then
            echo "GPG_PRIVATE_KEY is required for signed updates." >&2
            exit 1
          fi

      - name: Install GPG and sign updates
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          GPG_ARGS=(--batch --yes --detach-sign --armor)
          if [[ -n "${GPG_PASSPHRASE}" ]]; then
            GPG_ARGS+=(--pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}")
          fi
          if [[ -n "${GPG_KEY_ID}" ]]; then
            GPG_ARGS+=(--local-user "${GPG_KEY_ID}")
          fi
          shopt -s nullglob globstar
          for zip in artifacts/**/update_*.zip; do
            if [[ ! -f "${zip}.asc" ]]; then
              gpg "${GPG_ARGS[@]}" "${zip}"
            fi
          done

      - name: Deploy artifacts to VPS
        if: ${{ env.VPS_HOST != '' && env.VPS_SSH_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${VPS_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts
          ssh "${VPS_USER}@${VPS_HOST}" "mkdir -p ${VPS_PATH}/updates ${VPS_PATH}/updates/linux ${VPS_PATH}/updates/mac ${VPS_PATH}/updates/win ${VPS_PATH}/installers/linux ${VPS_PATH}/installers/mac ${VPS_PATH}/installers/win"

          shopt -s nullglob globstar

          linux_updates=(artifacts/firestorm-ubuntu-22.04-*/update_*.zip)
          linux_sigs=(artifacts/firestorm-ubuntu-22.04-*/update_*.zip.asc)
          mac_updates=(artifacts/firestorm-macos-latest-*/update_*.zip)
          mac_sigs=(artifacts/firestorm-macos-latest-*/update_*.zip.asc)
          win_updates=(artifacts/firestorm-windows-latest-*/update_*.zip)
          win_sigs=(artifacts/firestorm-windows-latest-*/update_*.zip.asc)

          if (( ${#linux_updates[@]} )); then
            rsync -av "${linux_updates[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/linux/"
            rsync -av "${linux_updates[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/"
          fi
          if (( ${#linux_sigs[@]} )); then
            rsync -av "${linux_sigs[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/linux/"
            rsync -av "${linux_sigs[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/"
          fi
          if (( ${#mac_updates[@]} )); then
            rsync -av "${mac_updates[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/mac/"
          fi
          if (( ${#mac_sigs[@]} )); then
            rsync -av "${mac_sigs[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/mac/"
          fi
          if (( ${#win_updates[@]} )); then
            rsync -av "${win_updates[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/win/"
          fi
          if (( ${#win_sigs[@]} )); then
            rsync -av "${win_sigs[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/updates/win/"
          fi

          linux_installers=(artifacts/firestorm-installer-ubuntu-22.04-*/**/*.deb)
          mac_installers=(artifacts/firestorm-installer-macos-latest-*/**/*.dmg)
          win_installers=(artifacts/firestorm-installer-windows-latest-*/**/*.exe)
          if (( ${#linux_installers[@]} )); then
            rsync -av "${linux_installers[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/linux/"
          fi
          if (( ${#mac_installers[@]} )); then
            rsync -av "${mac_installers[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/mac/"
          fi
          if (( ${#win_installers[@]} )); then
            rsync -av "${win_installers[@]}" "${VPS_USER}@${VPS_HOST}:${VPS_PATH}/installers/win/"
          fi
